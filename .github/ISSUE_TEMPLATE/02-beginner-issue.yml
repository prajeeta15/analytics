name: Beginner Issue Template
description: Create a beginner issue for contributors ready to learn the codebase and own a small implementation.
labels: ["beginner"]
assignees: []
body:
 
  - type: markdown
    attributes:
      value: |
        ---
        ## **Thanks for creating an beginner issue!** 😊

        Beginner issues are well-scoped tasks designed to help you learn the codebase and follow best-practices.

        Read more:
        > [Applying Beginner Label](https://github.com/hiero-ledger/sdk-collaboration-hub/tree/main/guides/issue-progression/for-maintainers/labelling-issues-examples.md)
        > [Issue Progression System](https://github.com/hiero-ledger/sdk-collaboration-hub/tree/main/guides/issue-progression/for-maintainers/README.md)
        ---

  - type: textarea
    id: intro
    attributes:
      label: 🧑‍🎓 Beginner Issue
      description: |
        Adapt as needed. Welcome message.
      value: |
        Welcome! This is a **[Beginner Issue](https://github.com/issues?q=is%3Aopen%20is%3Aissue%20org%3Ahiero-ledger%20archived%3Afalse%20no%3Aassignee%20(label%3A%22beginner%22%20OR%20label%3A%22skill%3A%20beginner%22)%20(repo%3Ahiero-ledger%2Fhiero-sdk-cpp%20OR%20repo%3Ahiero-ledger%2Fhiero-sdk-swift%20OR%20repo%3Ahiero-ledger%2Fhiero-sdk-python%20OR%20repo%3Ahiero-ledger%2Fhiero-sdk-js%20OR%20repo%3Ahiero-ledger%2Fhiero-website))** designed to help you learn the codebase.

        🏁 **When this issue is complete, you will have:**

        ✅ Researched a file or method in detail
        ✅ Followed Src patterns to implement a solution
        ✅ Researched and identified appropriate programming constructs to solve the problem
        ✅ Created basic tests
        ✅ Delivered a clean, review-ready pull request

  - type: textarea
    id: problem
    attributes:
      label: 🐞 Problem Description
      description: |
        Describe the issue so it is easy for a beginner contributor to understand what needs to be done and why. 
        Include which file(s) to look at, what the current behaviour is, and what the desired behaviour is.    
      value: |
        <!-- Describe the issue here -->  

        <!-- Identify which files to look at and patterns to recognise -->  

    validations:
      required: true


  - type: textarea
    id: solution
    attributes:
      label: 💡 Expected Solution
      description: |
        Briefly describe what the contributor should build or fix.
        This should be a short summary of the expected outcome — not a detailed implementation guide.
      value: |
        <!-- Describe the solution here -->
    validations:
      required: true

  - type: textarea
    id: research
    attributes:
      label: 🔍 Research Pointers
      description: |
        Point the contributor toward relevant files, similar code, protobuf definitions, or packages to study.
        This is the most important, "investigate before you code" step.
        Think: what would a colleague tell you if you asked "where do I start?"
        Include links to language documentation if the task involves a language concept.
      value: |
        <!-- Replace this with research pointers. -->

        <!-- Link to similar examples or language/concept documentation. -->
    validations:
      required: true

  - type: textarea
    id: implementation
    attributes:
      label: 🛠️ Implementation Notes
      description: |
        Briefly outline the implementation, nudging them to research and make their own decisions.
      value: |
        <!-- Outline how to apply the research and build the implementation. -->
    validations:
      required: true

  - type: textarea
    id: beginner_contributors
    attributes:
      label: 🧠 Beginner Contributors — Prerequisites & Expectations
      description: |
        Adapt as needed. Concrete requirements before claiming this beginner issue. Adapt as needed.
      value: |
        > [!CAUTION]
        > **Beginner issues are low-risk but we expect a working solution.**
  
        > [!IMPORTANT]
        > We recommend completing at least 1 good first issue before attempting a beginner issue.

        **Difficulty:**

        - Requires building knowledge of the specific file(s)
        - Beginner to intermediate Coding skills

        > [!TIP]
        > **You should be comfortable with:**
        > - Forking, branching, committing (with DCO + GPG signing), and opening a pull request without a tutorial
        > - Reading beginner to intermediate code you did not write and following its patterns
        > - Handling simple merge conflicts
        > - Keeping your fork up to date with main by [rebasing](https://github.com/hiero-ledger/sdk-collaboration-hub/tree/main/guides/issue-progression/for-developers/rebasing.md)
        > - Looking things up on your own before asking for help

        If any of that feels unfamiliar, good first issues might still be the most rewarding path for you right now — [find one here](https://github.com/issues?q=is%3Aopen%20is%3Aissue%20org%3Ahiero-ledger%20archived%3Afalse%20no%3Aassignee%20(label%3A%22good%20first%20issue%22%20OR%20label%3A%22skill%3A%20good%20first%20issue%22)%20(repo%3Ahiero-ledger%2Fhiero-sdk-cpp%20OR%20repo%3Ahiero-ledger%2Fhiero-sdk-swift%20OR%20repo%3Ahiero-ledger%2Fhiero-sdk-python%20OR%20repo%3Ahiero-ledger%2Fhiero-sdk-js%20OR%20repo%3Ahiero-ledger%2Fhiero-website)).
        You can always come back when you are ready.

        ### ⏱️ Timeline & Workflow
        - **Typical time:** ~1 Week / ~8 hours.
        🧩 Difficulty: Manageable but requires investigation and testing
        🎓 Best for: Beginner contributors

        > [!TIP]
        > **Suggested:** share your proposed implementation approach as a comment before writing code to get early feedback and avoid wasted effort.
        
  - type: textarea
    id: testing
    attributes:
      label: 🧪 Testing Requirements
      description: |
        Edit this section to set clear expectations for testing. 
        What types of tests should they write? How should they run them? What should they link in their PR as evidence?
      value: |
        > [!IMPORTANT]
        > At the beginner level, **testing will be necessary but a small component**.
        > The methods you implement should be verified (happy path at least)

        How you test depends on the type of change.

        **Source code changes (e.g. in `src/`):**
        - Write basic unit tests
        - Run tests locally: `uv run pytest tests/unit/<specific_file>_test.py -v`
        - Integration tests will run automatically when you push

        **GitHub Actions / workflow changes (e.g. in `.github/`):** [Guide](https://github.com/hiero-ledger/sdk-collaboration-hub/tree/main/guides/issue-progression/for-developers/github-action-workflows.md)
        - Test by merging to your fork's `main` and simulating the scenario

        **Example script changes (e.g. in `examples/`):**
        - Run the example script and confirm output matches expected behavior
        - You will need a [Hedera Portal](https://portal.hedera.com/) account for testnet credentials


  - type: textarea
    id: quality_standards
    attributes:
      label: 🛡️ Quality & Review Standards
      description: |
        Adapt as needed. The quality standards expected for beginner PRs.
      value: |        
        Beginner PRs must be **working and follow best practices**.

          1. **Working:** The implementation must solve the problem and meet the acceptance criteria.
          2. **Best Practices:** The solution should fit well with existing patterns and abstractions.
          3. **Testing:** basic unit and possibly integration tests to demonstrate the implementation works as expected.

        **⚠️ Breaking changes**
        - Watch for any changes that could impact existing users, even if they seem small.

        **🤖 AI notes**
        - AI has gaps or incorrect understanding of repo-specific patterns, logic, and protobuf schemes.

  - type: textarea
    id: acceptance
    attributes:
      label: ✅ PR Quality Checklist
      description: |
        Adapt as needed. These are the standards the contributor must meet before opening a PR.
      value: |
        Before opening your PR, confirm:

        - [ ] I have spent the majority of my time researching the problem and building my understanding of the codebase and methods.
        - [ ] My implementation works and is tested (if applicable).
        - [ ] Every line of code is personally understood and explainable.
        - [ ] My changes address what the issue asked for — nothing more, nothing less
        - [ ] I have applied appropriate linting, code quality, and formatting tools used in this repo.

        Before requesting a review, confirm:
        - [ ] I did not modify files unrelated to this issue
        - [ ] Clean git history — no rebase artifacts, merge commits, or unrelated files
        - [ ] My commits are signed: `git commit -S -s -m "chore: description"` — [Signing guide](https://github.com/hiero-ledger/sdk-collaboration-hub/tree/main/guides/issue-progression/for-developers/signing.md)
        - [ ] I have included appropriate tests and all CI checks pass.

  - type: textarea
    id: contribution_steps
    attributes:
      label: 📋 Workflow quick reference
      description: |
        Pre-filled reminders.
      value: |
        You have done this before — here are the links if you need them:

        | Step | Guide |
        |------|-------|
        | Claim this issue | Comment `/assign` below |
        | Sync with main | [Rebasing guide](https://github.com/hiero-ledger/sdk-collaboration-hub/tree/main/guides/issue-progression/for-developers/rebasing.md) |
        | Open a PR and link this issue | [PR guide](https://github.com/hiero-ledger/sdk-collaboration-hub/tree/main/guides/issue-progression/for-developers/contributor-workflow.md) |
        | Resolve merge conflicts | [Merge conflicts guide](https://github.com/hiero-ledger/sdk-collaboration-hub/tree/main/guides/issue-progression/for-developers/merge_conflicts.md) |

  - type: textarea
    id: resources
    attributes:
      label: 📚 Resources & Support
      value: |
        **🆘 Stuck?**
        > [!TIP]
        > **Comment on this issue:** and describe what you have tried. A maintainer will respond.

        **References:**
        - [Community Calls](https://zoom-lfx.platform.linuxfoundation.org/meetings/hiero?view=week)
        - [Discord](https://github.com/hiero-ledger/sdk-collaboration-hub/tree/main/guides/issue-progression/for-developers/discord.md)

