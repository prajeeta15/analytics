name: Intermediate Issue Template
description: Create a well-documented issue for contributors ready to own larger tasks independently
labels: ["intermediate"]
assignees: []
body:
 
  - type: markdown
    attributes:
      value: |
        ---
        ## **Thanks for creating an intermediate issue!** 😊

        Intermediate issues are complex tasks requiring significant independent research.

        Read more:
        > [Applying Intermediate Label](https://github.com/hiero-ledger/sdk-collaboration-hub/tree/main/guides/issue-progression/for-maintainers/labelling-issues-examples.md)
        > [Issue Progression System](https://github.com/hiero-ledger/sdk-collaboration-hub/tree/main/guides/issue-progression/for-maintainers/README.md)
        ---

  - type: textarea
    id: intro
    attributes:
      label: 🧑‍💻 Intermediate Issue
      description: |
        Adapt as needed. Welcome message.
      value: |
        Welcome! This is an **[Intermediate Issue](https://github.com/issues?q=is%3Aopen%20is%3Aissue%20org%3Ahiero-ledger%20archived%3Afalse%20no%3Aassignee%20(label%3A%22intermediate%22%20OR%20label%3A%22skill%3A%20intermediate%22)%20(repo%3Ahiero-ledger%2Fhiero-sdk-cpp%20OR%20repo%3Ahiero-ledger%2Fhiero-sdk-swift%20OR%20repo%3Ahiero-ledger%2Fhiero-sdk-python%20OR%20repo%3Ahiero-ledger%2Fhiero-sdk-js%20OR%20repo%3Ahiero-ledger%2Fhiero-website))** touching core SDK architecture.

        🏁 **When this issue is complete, you will have:**

        ✅ Researched across multiple files and modules
        ✅ Owned implementation decisions
        ✅ Written thorough, meaningful tests
        ✅ Delivered a clean, review-ready pull request

  - type: textarea
    id: problem
    attributes:
      label: 🐞 Problem Description
      description: |
        Clearly articulate the problem and its impact.
        Assume the reader can navigate src/, tests/, and examples/.
        Explain: what is wrong or missing, where it lives, and why it matters.      
      value: |
        <!-- Describe the issue here -->      
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 💡 Expected Solution
      description: |
        Briefly state what the contributor should build or fix.
        This should be a short summary of the expected outcome — not a detailed implementation guide.
      value: |
        <!-- Describe the solution here -->
    validations:
      required: true

  - type: textarea
    id: research
    attributes:
      label: 🔍 Background Research
      description: |
        Point the contributor toward relevant files, similar code, protobuf definitions, or packages to study.
        This is the most important, "investigate before you code" step.
      value: |
        <!-- Describe the research pointers here -->

        <!-- Point to similar high-quality implementations here -->

        <!-- Link to language, library or action documentation here -->

    validations:
      required: true

  - type: textarea
    id: intermediate_contributors
    attributes:
      label: 🧠 Intermediate Contributors — Prerequisites & Expectations
      description: |
        Adapt as needed. Concrete requirements before claiming this intermediate issue. Adapt as needed.
      value: |
        > [!CAUTION]
        > **Intermediate issues are higher complexity. We expect more than just a 'working solution' and will recommend beginner issues if the PR does not meet these standards.**
  
        ### 🏁 Concrete Prerequisites
        - **Advanced Programming Language:** Higher level intermediate programming language.
        - **Expertise:** Built a good understanding of the codebase relating to this issue.
        - **Proven History:** We recommend completing at least 1 beginner issue.

        > [!NOTE]
        > **CI/CD Exception:** For issues focused on **GitHub Actions / Workflows**, the repo-specific thresholds above may be waived if the contributor demonstrates intermediate-level proficiency in CI/CD.

        If this feels like too big a step, that is completely fine — try a [Beginner Issue](https://github.com/issues?q=is%3Aopen%20is%3Aissue%20org%3Ahiero-ledger%20archived%3Afalse%20no%3Aassignee%20(label%3A%22beginner%22%20OR%20label%3A%22skill%3A%20beginner%22)%20(repo%3Ahiero-ledger%2Fhiero-sdk-cpp%20OR%20repo%3Ahiero-ledger%2Fhiero-sdk-swift%20OR%20repo%3Ahiero-ledger%2Fhiero-sdk-python%20OR%20repo%3Ahiero-ledger%2Fhiero-sdk-js%20OR%20repo%3Ahiero-ledger%2Fhiero-website)) first or a different **[Intermediate Issue](https://github.com/issues?q=is%3Aopen%20is%3Aissue%20org%3Ahiero-ledger%20archived%3Afalse%20no%3Aassignee%20(label%3A%22intermediate%22%20OR%20label%3A%22skill%3A%20intermediate%22)%20(repo%3Ahiero-ledger%2Fhiero-sdk-cpp%20OR%20repo%3Ahiero-ledger%2Fhiero-sdk-swift%20OR%20repo%3Ahiero-ledger%2Fhiero-sdk-python%20OR%20repo%3Ahiero-ledger%2Fhiero-sdk-js%20OR%20repo%3Ahiero-ledger%2Fhiero-website))**. You can always come back when you are ready.

        ### ⏱️ Timeline & Workflow
        - **Typical time:** ~2 weeks / ~25 hours.

        > [!TIP]
        > **Suggested:** share your proposed implementation approach as a comment before writing code to get early feedback and avoid wasted effort.

  - type: textarea
    id: testing
    attributes:
      label: 🧪 Testing Requirements
      description: |
        Edit this section to set clear expectations for testing. 
        What types of tests should they write? How should they run them? What should they link in their PR as evidence?
      value: |
        How you test depends on the type of change.

        > [!IMPORTANT]
        > At the intermediate level, **testing is a major component**.
        > Each method you implement should be verified. Tests should cover happy paths,
        > edge cases, and error handling.

        **Source code changes (e.g. in `src/`):**
        - Write unit tests covering happy path, edge cases, and error handling

        **GitHub Actions / workflow changes (e.g. in `.github/`):** [Guide](https://github.com/hiero-ledger/sdk-collaboration-hub/tree/main/guides/issue-progression/for-developers/github-action-workflows.md)
        - Test by merging to your fork's `main` and simulating the scenario
        - Create test issues or PRs as evidence and link them in your PR
        - Include screenshots of workflow runs where applicable

        **Example script changes (e.g. in `examples/`):**
        - Run the example script and confirm output matches expected behavior


  - type: textarea
    id: quality_standards
    attributes:
      label: 🛡️ Quality & Review Standards
      description: |
        Adapt as needed. The quality standards expected for intermediate PRs.
      value: |        
        Intermediate PRs must be **"working, maintainable, and aligned with the architecture."**

          1. **Working:** The implementation must solve the problem and meet the acceptance criteria.
          2. **Maintainable:** Code should be clear and concise enough for others to understand and debug without your assistance.
          3. **Alignment:** The solution should fit well with existing SDK patterns and abstractions.
          4. **Comprehensive Testing:** Must include unit tests and data processing quality checks.

  - type: textarea
    id: acceptance
    attributes:
      label: ✅ PR Quality Checklist
      description: |
        Adapt as needed. These are the standards the contributor must meet before opening a PR.
      value: |
        Before opening your PR, confirm:

        - [ ] My implementation works but is also of high quality - including maintainability, readability, and architectural fit.
        - [ ] The system design fits with current architectural approaches.

        Before requesting a review, confirm:
        - [ ] I have reviewed the diff line by line.
        - [ ] My implementation fully addresses the problem described above.
        - [ ] Clean git history — no rebase artifacts, merge commits, or unrelated files
        - [ ] My commits are signed: `git commit -S -s -m "chore: description"` — [Signing guide](https://github.com/hiero-ledger/sdk-collaboration-hub/tree/main/guides/issue-progression/for-developers/signing.md)
        - [ ] I have included appropriate tests and all CI checks pass.

  - type: textarea
    id: resources
    attributes:
      label: 📚 Resources & Support
      value: |
        **🆘 Stuck?**
        > [!TIP]
        > **Comment on this issue:** and describe what you have tried. A maintainer will respond.

        **References:**
        - [Community Calls](https://zoom-lfx.platform.linuxfoundation.org/meetings/hiero?view=week)
        - [Discord](https://github.com/hiero-ledger/sdk-collaboration-hub/tree/main/guides/issue-progression/for-developers/discord.md)
