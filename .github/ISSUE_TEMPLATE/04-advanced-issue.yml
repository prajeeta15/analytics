name: Advanced Issue Template
description: For expert contributors tackling architectural, multi-module, or core-logic changes.
labels: ["advanced"]
assignees: []

body:
 
  - type: markdown
    attributes:
      value: |
        ---
        ## **Thanks for creating an advanced issue!** 😊

        Advanced issues are high-ownership, high-impact tasks requiring significant independent research and testing for accuracy.

        Read more:
        > [Applying Advanced Label](https://github.com/hiero-ledger/sdk-collaboration-hub/tree/main/guides/issue-progression/for-maintainers/labelling-issues-examples.md)
        > [Issue Progression System](https://github.com/hiero-ledger/sdk-collaboration-hub/tree/main/guides/issue-progression/for-maintainers/README.md)
        ---

  - type: textarea
    id: intro
    attributes:
      label: 🧑‍🔬 Advanced Issue
      description: |
        Adapt as needed. Welcome message.
      value: |
        Welcome! This is an **[Advanced Issue](https://github.com/issues?q=is%3Aopen%20is%3Aissue%20org%3Ahiero-ledger%20archived%3Afalse%20no%3Aassignee%20(label%3A%22advanced%22%20OR%20label%3A%22skill%3A%20advanced%22)%20(repo%3Ahiero-ledger%2Fhiero-sdk-cpp%20OR%20repo%3Ahiero-ledger%2Fhiero-sdk-swift%20OR%20repo%3Ahiero-ledger%2Fhiero-sdk-python%20OR%20repo%3Ahiero-ledger%2Fhiero-sdk-js%20OR%20repo%3Ahiero-ledger%2Fhiero-website))** touching core SDK architecture.

        It is designed for expert contributors who have demonstrated a good eye for accuracy and a proven track record of high-quality contributions.

  - type: textarea
    id: problem
    attributes:
      label: 🐞 Problem Description
      description: |
        Clearly articulate the problem and its impact. The solution may be unclear or require significant research.
      value: |
        <!-- Describe the issue here -->      
    validations:
      required: true

  - type: textarea
    id: implementation
    attributes:
      label: 🛠️ Implementation Notes
      description: |
        Provide implementation context to understand the complexity and possible approaches.

        Add:
        - Implementation ideas
        - Clarify what is unknown or uncertain about the implementation
        - Highlight any key risks or complexities
      value: |
        <!-- Describe the implementation notes -->      
    validations:
      required: true

  - type: textarea
    id: advanced_contributors
    attributes:
      label: 🧠 Advanced Contributors — Prerequisites & Expectations
      description: |
        Adapt as needed. Concrete requirements before claiming this advanced issue. Adapt as needed.
      value: |
        > [!CAUTION]
        > **Advanced issues are the most complex work in this project.**

        ### 🏁 Concrete Prerequisites
        - **Advanced Language:** Advanced programming language.
        - **Expertise:** Great understanding of the codebase.
        - **Proven History:** Successfully completed **≥ 1 intermediate issue** in this repo.

        > [!NOTE]
        > **CI/CD Exception:** For issues focused on **GitHub Actions / Workflows**, the repo-specific thresholds above may be waived if the contributor demonstrates advanced-level proficiency in CI/CD.

        ### ⏱️ Timeline & Workflow
        - **Typical time:** ~1 month / ~30 hours.

  - type: textarea
    id: quality_standards
    attributes:
      label: 🛡️ Quality & Review Standards
      description: |
        Adapt as needed. The quality standards expected for advanced PRs.
      value: |
        Advanced PRs must be **"safe, maintainable, architecturally sound, and production-ready."**

        1. **Architectural Fit:** The solution must fit naturally into the existing SDK abstractions.
        2. **Security & Correctness:** Evaluate all logic for injection risks, state corruption, or thread-safety issues. 
        3. **Maintainability:** Code must be short and clear enough for any other maintainer to debug without your assistance. 
        4. **Comprehensive Testing:** Must include unit tests and data verification methods.

  - type: textarea
    id: acceptance
    attributes:
      label: ✅ PR Quality Checklist
      description: |
        Adapt as needed. These are the standards the contributor must meet before opening a PR.
      value: |
        Before opening your PR, the contributor must confirm:
        - [ ] I have spent the majority of my time researching the problem and solution space extensively, including reviewing relevant code, documentation, and external resources.
        - [ ] I understand the system-wide impact of these changes on affected modules and performance.
        - [ ] The system design fits with current Hiero architectural approaches.
        - [ ] I have tested my changes extensively

  - type: textarea
    id: resources
    attributes:
      label: 📚 Resources & Support
      value: |
        **🆘 Stuck?**
        - [Community Calls](https://zoom-lfx.platform.linuxfoundation.org/meetings/hiero?view=week)
        - [Discord](https://github.com/hiero-ledger/sdk-collaboration-hub/tree/main/guides/issue-progression/for-developers/discord.md)
