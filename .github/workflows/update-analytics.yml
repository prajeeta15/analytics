name: Refresh Analytics Data

on:
  schedule:
    # Run daily at 9 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      dryrun:
        description: 'Dry run mode (log changes instead of creating PR)'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 #v6.2.0
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 #v8.0.0
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run gfic gfi analytics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run python -m hiero_analytics.run_gfic_gfi_org

      - name: Run difficulty analytics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run python -m hiero_analytics.run_difficulty_org_for_repo

      - name: Run onboarding analytics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run python -m hiero_analytics.run_onboarding_signal_for_repo

      - name: Run contributor analytics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run python -m hiero_analytics.run_contributor_profiles_repo

      - name: Run maintainer analytics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run python -m hiero_analytics.run_maintainer_pipeline_org

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Check for existing PR opened today
        id: check_existing_pr
        if: steps.check_changes.outputs.has_changes == 'true' && inputs.dryrun != 'true'
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "Checking for PRs opened today ($TODAY)..."
          
          # Get open PRs with the automated label created today AND matching title
          PRS=$(gh pr list \
            --state open \
            --label automated \
            --label analytics \
            --json createdAt,number,title \
            --jq ".[] | select(.createdAt | startswith(\"$TODAY\")) | select(.title | contains(\"Refresh Analytics Data\")) | .number" \
            2>/dev/null || echo "")
          
          if [ -z "$PRS" ]; then
            echo "pr_exists=false" >> $GITHUB_OUTPUT
            echo "No existing refresh PR found for today"
          else
            echo "pr_exists=true" >> $GITHUB_OUTPUT
            echo "Found existing refresh PR(s): $PRS"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Log changes (dry run)
        if: steps.check_changes.outputs.has_changes == 'true' && inputs.dryrun == 'true'
        run: |
          echo "::group::Modified files"
          git diff --name-only
          echo "::endgroup::"
          echo "::group::Changes summary"
          git diff --stat
          echo "::endgroup::"
          echo "::group::Full diff"
          git diff
          echo "::endgroup::"

      - name: Stage all changes
        if: steps.check_changes.outputs.has_changes == 'true' && inputs.dryrun != 'true'
        run: |
          git add -A

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true' && inputs.dryrun != 'true'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 #v8.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: refresh analytics data and charts'
          title: '[Automated] Refresh Analytics Data'
          body: |
            ## Automated Analytics Refresh
            
            This PR contains updated analytics data and charts generated by the scheduled refresh workflow.
            
            ### Changes
            - Updated CSV data files in `outputs/data/`
            - Updated PNG charts in `outputs/charts/`
            - Refreshed cached data
            
            **Note:** This is an automated PR. Please review the changes before merging.
          branch: analytics-refresh-${{ github.run_number }}
          delete-branch: true
          labels: |
            automated
            analytics
